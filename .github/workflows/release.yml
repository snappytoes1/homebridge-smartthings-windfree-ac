name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish with
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Check release tag matches package version
        if: github.event_name == 'release'
        run: node -e 'const version = require("./package.json").version; const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ""); if (version !== tag) { throw new Error("package.json version " + version + " does not match release tag " + process.env.GITHUB_REF_NAME); }'

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "tag=beta" >> "$GITHUB_OUTPUT"
            else
              echo "tag=latest" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=${{ inputs.npm_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish --provenance --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
