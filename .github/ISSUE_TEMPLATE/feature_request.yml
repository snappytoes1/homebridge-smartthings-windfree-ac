name: Feature request
description: Suggest a SmartThings or HomeKit capability improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What HomeKit or SmartThings behavior should improve?
    validations:
      required: true
  - type: textarea
    id: capability
    attributes:
      label: SmartThings capability or status payload
      description: Paste sanitized capability/status details if this depends on a real device.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should we know this works?
    validations:
      required: false
